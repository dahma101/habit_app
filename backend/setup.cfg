[mypy]
python_version = 3.13
plugins =
    mypy_django_plugin.main,
    mypy_drf_plugin.main

[mypy.plugins.django-stubs]
django_settings_module = config.settings.development

[mypy-celery.*]
ignore_missing_imports = True

[mypy-factory.*]
ignore_missing_imports = True

[mypy-sphinx.*]
ignore_missing_imports = True

[coverage:run]
source = apps
omit =
    */migrations/*
    */tests/*
    */test_*

[coverage:report]
fail_under = 80
