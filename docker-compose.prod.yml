services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: ./backend/.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped

  celery:
    build: ./backend
    command: celery -A celery_app worker --loglevel=info
    env_file: ./backend/.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
    restart: unless-stopped

  celerybeat:
    build: ./backend
    command: celery -A celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: ./backend/.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  docs:
    build:
      context: ./backend
      dockerfile: Dockerfile.docs
    restart: unless-stopped

  caddy:
    build: ./caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      CF_API_TOKEN: ${CF_API_TOKEN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - docs
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
